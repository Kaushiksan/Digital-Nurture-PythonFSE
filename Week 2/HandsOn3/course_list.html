<!DOCTYPE html>
<html>
<head>
    <title>Course List</title>
</head>
<body>

<h1>Course List</h1>

<table border="1" cellpadding="8">

<tr>
    <th>Course Name</th>
    <th>Course Code</th>
    <th>Credits</th>
</tr>

{% for course in courses %}

<tr>
    <td>{{ course.course_name }}</td>
    <td>{{ course.course_code }}</td>
    <td>{{ course.credits }}</td>
</tr>

{% empty %}

<tr>
    <td colspan="3">
        No Courses Available
    </td>
</tr>

{% endfor %}

</table>

<br>

<a href="{% url 'course_add' %}">
Add New Course
</a>

</body>
</html>
